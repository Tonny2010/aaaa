<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quadrado Saltitante</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:yellow;
      height:100vh;
    }

    /* Chão */
    .ground{
      position:absolute;
      bottom:0;
      width:100%;
      height:120px;
      background:black;
    }

    /* Quadrado */
    .player{
      position:absolute;
      width:80px;
      height:80px;
      background:limegreen;

      left:100px;
      bottom:120px;
    }
  </style>
</head>
<body>

  <div class="player" id="player"></div>
  <div class="ground"></div>

  <script>
    const player = document.getElementById("player");

    let positionX = 100;
    let velocityY = 0;
    let isJumping = false;

    const groundHeight = 120;
    let positionY = groundHeight;

    // Movimento lateral
    document.addEventListener("keydown", (event) => {

      if(event.code === "ArrowRight"){
        positionX += 20;
      }

      if(event.code === "ArrowLeft"){
        positionX -= 20;
      }

      // Pulo
      if(event.code === "Space" && !isJumping){
        velocityY = 18;
        isJumping = true;
      }

      player.style.left = positionX + "px";
    });

    // Gravidade
    function gameLoop(){

      velocityY -= 1;

      positionY += velocityY;

      // Limite do chão
      if(positionY <= groundHeight){
        positionY = groundHeight;
        velocityY = 0;
        isJumping = false;
      }

      player.style.bottom = positionY + "px";

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

</body>
</html>
